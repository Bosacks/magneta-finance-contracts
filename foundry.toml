[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "@layerzerolabs/=node_modules/@layerzerolabs/",
  "hardhat/=node_modules/hardhat/",
  "ds-test/=lib/forge-std/lib/ds-test/src/",
  "forge-std/=lib/forge-std/src/"
]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
